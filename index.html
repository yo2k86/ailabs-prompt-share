<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ailabs Prompt Engineering</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.05)',
                        glassBorder: 'rgba(255, 255, 255, 0.1)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #030303;
            color: #e5e5e5;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 255, 255, 0.04), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.03), transparent 30%);
            background-attachment: fixed;
        }

        .glass-card {
            background: rgba(30, 30, 30, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .glass-header {
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        @keyframes heartPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .liked-anim { animation: heartPulse 0.3s ease-in-out; }
    </style>
</head>
<body class="min-h-screen antialiased selection:bg-white selection:text-black">

    <div class="fixed inset-0 z-[-1] pointer-events-none">
        <div class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] bg-white/5 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[400px] h-[400px] bg-white/5 rounded-full blur-[100px]"></div>
    </div>

    <nav class="glass-header sticky top-0 z-50 px-6 py-4 flex items-center justify-between shadow-xl">
        <div class="flex items-center gap-3 cursor-pointer" onclick="checkAdmin()" title="Ketuk untuk akses admin">
            <div class="w-8 h-8 rounded bg-white flex items-center justify-center">
                <i class="fas fa-brain text-black text-lg"></i>
            </div>
            <h1 class="text-xl md:text-2xl font-bold tracking-widest text-white uppercase">
                Ailabs <span class="font-light text-gray-400">Prompt</span>
            </h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="connection-status" class="text-[10px] uppercase tracking-tighter px-2 py-1 rounded border border-blue-500/30 text-blue-400 font-mono">LOCAL MODE</div>
            <a href="#" class="text-gray-400 hover:text-white transition hidden md:block">
                <i class="fab fa-facebook text-2xl"></i>
            </a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10 md:px-8 max-w-5xl">
        <div class="text-center mb-12">
            <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">Galeri Prompt AI (Test Mode)</h2>
            <p class="text-gray-400">Mode pengetesan tanpa database. Data akan hilang jika web di-refresh.</p>
        </div>

        <div id="prompts-container" class="space-y-8">
            <!-- Tempat prompt akan dirender -->
        </div>
    </main>

    <button id="add-prompt-btn" onclick="openAdminModal()" class="hidden fixed bottom-20 right-6 w-14 h-14 bg-white text-black rounded-full flex items-center justify-center text-2xl shadow-[0_0_20px_rgba(255,255,255,0.3)] hover:scale-110 transition-transform z-40">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Modal Login Admin -->
    <div id="admin-login-modal" class="hidden fixed inset-0 z-[105] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-6 rounded-2xl text-center">
            <h3 class="text-xl font-bold text-white mb-4"><i class="fas fa-user-secret mr-2"></i>Akses Admin</h3>
            <input type="password" id="admin-code-input" class="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-white/30 text-center mb-4" placeholder="Masukkan kode rahasia">
            <div class="flex gap-2 justify-center">
                <button onclick="closeAdminLogin()" class="px-4 py-2 rounded-lg text-gray-400 hover:text-white transition">Batal</button>
                <button onclick="verifyAdmin()" class="px-6 py-2 rounded-lg bg-white text-black font-bold hover:bg-gray-200 transition">Login</button>
            </div>
        </div>
    </div>

    <!-- Custom Alert -->
    <div id="custom-alert" class="hidden fixed top-10 left-1/2 -translate-x-1/2 z-[110] glass-card px-6 py-3 rounded-full flex items-center gap-3 transition-all duration-300 transform -translate-y-10 opacity-0 pointer-events-none">
        <i class="fas fa-info-circle text-white"></i>
        <span id="alert-message" class="text-white text-sm font-medium"></span>
    </div>

    <!-- Modal Tambah Prompt (KEMBALI KE LINK URL) -->
    <div id="admin-modal" class="hidden fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">
        <div class="glass-card w-full max-w-lg p-6 rounded-2xl my-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white">Tambah Prompt (Local Test)</h3>
                <button onclick="closeAdminModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Judul Prompt</label>
                    <input type="text" id="input-title" class="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-white/30" placeholder="Contoh: Cyberpunk Lion">
                </div>
                <div>
                    <label class="block text-sm text-yellow-400 font-semibold mb-1">Link Postimages (Direct Link)</label>
                    <input type="url" id="input-media-url" class="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-white/30" placeholder="https://i.postimg.cc/xxxx/gambar.jpg">
                    <p class="text-[11px] text-gray-400 mt-1">Harus berakhiran .jpg atau .png</p>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Teks Prompt</label>
                    <textarea id="input-prompt" rows="4" class="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-white/30 text-sm" placeholder="Ketik prompt di sini..."></textarea>
                </div>
                <div class="flex gap-3 mt-4">
                    <button onclick="closeAdminModal()" class="w-1/3 px-4 py-3 rounded-lg text-gray-400 border border-white/10 font-medium hover:bg-white/5 transition">Batal</button>
                    <button id="btn-simpan" onclick="addNewPrompt()" class="w-2/3 bg-white text-black font-bold py-3 rounded-lg hover:bg-gray-200 transition-colors flex items-center justify-center">
                        <span id="text-simpan">Simpan ke Layar</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Konfirmasi Hapus -->
    <div id="confirm-delete-modal" class="hidden fixed inset-0 z-[115] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-6 rounded-2xl text-center">
            <div class="w-12 h-12 rounded-full bg-red-500/20 flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-trash-alt text-red-500"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">Hapus Prompt?</h3>
            <div class="flex gap-3 justify-center mt-6">
                <button onclick="closeConfirmDelete()" class="px-5 py-2 rounded-lg text-gray-400 flex-1 hover:bg-white/5 border border-white/10">Batal</button>
                <button onclick="executeDelete()" class="px-5 py-2 rounded-lg bg-red-600 text-white font-bold flex-1 hover:bg-red-700 transition">Hapus</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 glass-card px-5 py-3 rounded-lg flex items-center gap-3 opacity-0 pointer-events-none transition-opacity duration-300 z-50">
        <i class="fas fa-check-circle text-white"></i>
        <span class="text-white text-sm font-medium">Berhasil!</span>
    </div>

    <footer class="border-t border-white/10 mt-20 py-8 text-center text-gray-500 text-xs">
        <p>&copy; 2024 Ailabs Prompt Engineering. Mode Uji Coba.</p>
    </footer>

    <!-- SCRIPT MURNI JAVASCRIPT LOKAL (TANPA FIREBASE/BACKEND) -->
    <script>
        let promptData = [];
        window.isAdmin = false;

        window.showCustomAlert = (message) => {
            const alertBox = document.getElementById('custom-alert');
            document.getElementById('alert-message').innerText = message;
            alertBox.classList.remove('hidden');
            setTimeout(() => alertBox.classList.remove('-translate-y-10', 'opacity-0'), 10);
            setTimeout(() => {
                alertBox.classList.add('-translate-y-10', 'opacity-0');
                setTimeout(() => alertBox.classList.add('hidden'), 300);
            }, 5000);
        }

        window.showToast = (msg = "Berhasil!") => {
            const toast = document.getElementById('toast');
            toast.querySelector('span').innerText = msg;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 3000);
        }

        window.renderPrompts = () => {
            const container = document.getElementById('prompts-container');
            
            if (promptData.length === 0) {
                container.innerHTML = '<div class="text-center py-20 text-gray-600 italic">Data kosong. Silakan tambah prompt dari Admin.</div>';
                return;
            }

            const likedList = JSON.parse(localStorage.getItem('likedPrompts') || '[]');
            
            container.innerHTML = promptData.map(item => {
                const isLiked = likedList.includes(item.id);
                const mediaUrl = item.mediaUrl;
                
                // Fallback untuk render gambar
                const mediaElement = `<img src="${mediaUrl}" alt="${item.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy" onerror="this.src='https://placehold.co/800x600/111/fff?text=Link+Gambar+Rusak';">`;

                return `
                    <div class="glass-card rounded-2xl flex flex-col md:flex-row group w-full relative" id="card-${item.id}">
                        ${window.isAdmin ? `
                        <button onclick="confirmDelete('${item.id}')" class="absolute top-4 right-4 bg-red-600/80 hover:bg-red-600 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-sm transition z-20 shadow-lg">
                            <i class="fas fa-trash-alt"></i>
                        </button>` : ''}

                        <div class="w-full md:w-5/12 h-64 md:h-auto shrink-0 relative overflow-hidden bg-neutral-900">
                            ${mediaElement}
                            <div class="absolute inset-0 bg-gradient-to-t md:bg-gradient-to-r from-[#1e1e1e]/80 to-transparent pointer-events-none"></div>
                        </div>
                        <div class="w-full md:w-7/12 p-6 md:p-8 flex flex-col justify-between">
                            <div>
                                <div class="flex items-center gap-2 mb-2">
                                    <h3 class="text-xl font-bold text-white">${item.title}</h3>
                                </div>
                                <div class="bg-black/40 border border-white/10 rounded-lg p-4 mb-6">
                                    <p class="text-sm text-gray-300 font-mono leading-relaxed" id="prompt-text-${item.id}">${item.prompt}</p>
                                </div>
                            </div>
                            <div class="flex items-center justify-between">
                                <button onclick="toggleLike('${item.id}', ${item.likes})" class="flex items-center gap-2 px-4 py-2 rounded-full border border-white/10 hover:bg-white/10 transition-colors group/btn">
                                    <i class="${isLiked ? 'fas fa-heart text-white liked-anim' : 'far fa-heart text-gray-400'}"></i>
                                    <span class="text-sm font-medium ${isLiked ? 'text-white' : 'text-gray-400'}">${item.likes || 0}</span>
                                </button>
                                <button onclick="copyPrompt('${item.id}')" class="flex items-center gap-2 bg-white text-black px-6 py-2 rounded-full font-semibold hover:bg-gray-200 transition-all active:scale-95">
                                    <i class="fas fa-copy"></i><span class="text-sm">Salin Prompt</span>
                                </button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        };

        window.toggleLike = (id, currentLikes) => {
            const likedList = JSON.parse(localStorage.getItem('likedPrompts') || '[]');
            const isLiked = likedList.includes(id);
            
            if (isLiked) likedList.splice(likedList.indexOf(id), 1);
            else likedList.push(id);
            
            localStorage.setItem('likedPrompts', JSON.stringify(likedList));
            
            // Update UI lokal
            const index = promptData.findIndex(p => p.id === id);
            if(index !== -1) {
                promptData[index].likes = isLiked ? Math.max(0, currentLikes - 1) : (currentLikes || 0) + 1;
                window.renderPrompts();
            }
        }

        window.copyPrompt = (id) => {
            const text = document.getElementById(`prompt-text-${id}`).innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            window.showToast("Prompt disalin!");
        }

        window.checkAdmin = () => {
            if (window.isAdmin) return window.showCustomAlert("Admin sudah aktif.");
            document.getElementById('admin-login-modal').classList.remove('hidden');
        }

        window.verifyAdmin = () => {
            if (document.getElementById('admin-code-input').value === "Kr333wol") {
                window.isAdmin = true;
                document.getElementById('add-prompt-btn').classList.remove('hidden');
                document.getElementById('admin-login-modal').classList.add('hidden');
                window.showCustomAlert("Akses Admin Aktif!");
                window.renderPrompts();
            } else {
                window.showCustomAlert("Kode Salah!");
            }
        }

        window.closeAdminLogin = () => document.getElementById('admin-login-modal').classList.add('hidden');
        
        window.openAdminModal = () => {
            document.getElementById('admin-modal').classList.remove('hidden');
        }
        
        window.closeAdminModal = () => {
            document.getElementById('admin-modal').classList.add('hidden');
            resetForm();
        }

        const resetForm = () => {
            document.getElementById('input-title').value = '';
            document.getElementById('input-media-url').value = '';
            document.getElementById('input-prompt').value = '';
        };

        // FUNGSI SIMPAN KE MEMORI LOKAL SAJA (Tanpa Database)
        window.addNewPrompt = () => {
            const title = document.getElementById('input-title').value.trim();
            const mediaUrl = document.getElementById('input-media-url').value.trim();
            const prompt = document.getElementById('input-prompt').value.trim();
            
            if (!title || !mediaUrl || !prompt) {
                return window.showCustomAlert("Lengkapi form (Judul, Link, dan Prompt)!");
            }

            // Data sementara disimpan ke dalam Array
            const newItem = {
                id: 'local-' + Date.now(),
                title: title,
                mediaUrl: mediaUrl,
                prompt: prompt,
                likes: 0
            };

            promptData.unshift(newItem); // Taruh di urutan paling atas
            
            window.renderPrompts();
            window.closeAdminModal();
            window.showToast("Tampil di layar! (Akan hilang jika di-refresh) ✅");
            resetForm();
        }

        let deleteDataId = null; 
        window.confirmDelete = (id) => { 
            deleteDataId = id; 
            document.getElementById('confirm-delete-modal').classList.remove('hidden'); 
        }
        window.closeConfirmDelete = () => {
            deleteDataId = null;
            document.getElementById('confirm-delete-modal').classList.add('hidden');
        }
        
        window.executeDelete = () => {
            if (!deleteDataId) return;
            
            promptData = promptData.filter(item => item.id !== deleteDataId);
            window.renderPrompts();
            window.closeConfirmDelete();
            window.showToast("Dihapus dari layar 🗑️");
        }

        // Render awal saat web dibuka
        window.renderPrompts();

    </script>
</body>
</html>
